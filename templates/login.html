<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealMaker v2 — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 48px;
      width: 100%;
      max-width: 380px;
    }
    .login-card .brand {
      display: block;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 28px;
    }
    .login-card .brand span { color: var(--primary); }
    .login-card .form-row { margin-bottom: 16px; }
    .login-card .form-row input { max-width: 100%; }
    .login-card .btn {
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <span class="brand">DealMaker <span>v2</span></span>

      {% if error %}
        <div class="alert alert--error">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('auth.login_post', next=request.args.get('next', '')) }}">
        <div class="form-row">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            autofocus
            required
          />
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn btn--primary">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
